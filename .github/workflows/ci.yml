name: CI

on:
  push:
    branches: ['main', 'dev']
  pull_request:
    branches: ['main']

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint check
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build